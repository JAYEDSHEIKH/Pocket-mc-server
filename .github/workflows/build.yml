name: Build Debug APK

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, develop, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Bundle
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java for Gradle ─────────────────────────────────────────────────────
      - name: Set up JDK 17 (for Gradle)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Gradle cache ────────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── Download & bundle the aarch64 JRE ───────────────────────────────────
      # Uses Adoptium (Temurin) API — URLs are stable and version-pinned.
      # The JRE is extracted from the tarball and re-tarballed into the exact
      # asset path that JreInstaller.kt expects: assets/jre/aarch64-jdk21.tar.gz
      - name: Download OpenJDK 21 aarch64 JRE
        run: |
          set -e

          # Fetch the latest JDK 21 release URL from Adoptium API
          RELEASE_URL=$(curl -sSf \
            "https://api.adoptium.net/v3/assets/latest/21/jdk?architecture=aarch64&image_type=jre&os=linux&vendor=eclipse" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          # Find the linux/aarch64 JRE tarball
          for entry in data:
              pkg = entry.get('binary', {}).get('package', {})
              link = pkg.get('link', '')
              if link.endswith('.tar.gz'):
                  print(link)
                  break
          ")

          if [ -z "$RELEASE_URL" ]; then
            echo "ERROR: Could not determine JRE download URL from Adoptium API"
            exit 1
          fi

          echo "Downloading JRE from: $RELEASE_URL"
          curl -sSfL "$RELEASE_URL" -o /tmp/jre-aarch64.tar.gz

          # Verify the tarball is not empty
          SIZE=$(stat -c%s /tmp/jre-aarch64.tar.gz)
          echo "Downloaded $SIZE bytes"
          if [ "$SIZE" -lt 10000000 ]; then
            echo "ERROR: Downloaded tarball is too small — download likely failed"
            exit 1
          fi

          # Place the tarball directly where JreInstaller expects it
          mkdir -p app/src/main/assets/jre
          cp /tmp/jre-aarch64.tar.gz app/src/main/assets/jre/aarch64-jdk21.tar.gz
          echo "JRE asset placed at app/src/main/assets/jre/aarch64-jdk21.tar.gz ($(du -h app/src/main/assets/jre/aarch64-jdk21.tar.gz | cut -f1))"

      # ── Grant gradlew permission ────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x gradlew

      # ── Build ───────────────────────────────────────────────────────────────
      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      # ── Rename with build number for easier identification ──────────────────
      - name: Rename APK
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          NEW_NAME="PocketCraft-debug-${{ github.run_number }}.apk"
          cp "$APK_PATH" "$NEW_NAME"
          echo "APK_NAME=$NEW_NAME" >> $GITHUB_ENV
          echo "APK_PATH=$NEW_NAME" >> $GITHUB_ENV

      # ── Upload artifact ─────────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PocketCraft-debug-${{ github.run_number }}
          path: ${{ env.APK_PATH }}
          retention-days: 30

      - name: Build summary
        run: |
          echo "## ✅ Build complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**APK:** \`${{ env.APK_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download from the **Artifacts** section above." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### JRE included" >> $GITHUB_STEP_SUMMARY
          echo "The bundled OpenJDK 21 aarch64 JRE is included in this APK." >> $GITHUB_STEP_SUMMARY
          echo "Servers will start successfully on arm64 Android devices (API 26+)." >> $GITHUB_STEP_SUMMARY
