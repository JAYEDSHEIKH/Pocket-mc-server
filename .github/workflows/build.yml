name: Build Debug APK

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ──────────────────────────────────────────────────────────────────
      # gradle/actions/setup-gradle downloads and installs the Gradle
      # distribution specified in gradle-wrapper.properties automatically,
      # bootstrapping the wrapper JAR if it isn't committed.
      # ──────────────────────────────────────────────────────────────────
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ──────────────────────────────────────────────────────────────────
      # Bundle the aarch64 OpenJDK 21 raw asset before building.
      # Azul Zulu headless JRE — no GUI libs, perfect for running server
      # jars.  Update this URL when a newer JDK release is available.
      # ──────────────────────────────────────────────────────────────────
      - name: Download aarch64 JDK 21 asset
        run: |
          mkdir -p app/src/main/assets/jre
          JRE_URL="https://cdn.azul.com/zulu/bin/zulu21.38.21-ca-jre21.0.5-linux_aarch64.tar.gz"
          curl -L --retry 3 -o app/src/main/assets/jre/aarch64-jdk21.tar.gz "$JRE_URL"
          echo "JRE asset: $(du -sh app/src/main/assets/jre/aarch64-jdk21.tar.gz | cut -f1)"

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PocketCraft-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload build reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports-${{ github.run_number }}
          path: |
            app/build/reports/
            app/build/outputs/logs/
          retention-days: 7
