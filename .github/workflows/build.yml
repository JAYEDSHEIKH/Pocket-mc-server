name: Build APK

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, develop, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java for Gradle ─────────────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # ── Gradle cache ────────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── Bundle the aarch64 JRE asset ────────────────────────────────────────
      # Downloads OpenJDK 21 (aarch64 Linux) from the Adoptium API and places
      # it where JreInstaller.kt expects it: assets/jre/aarch64-jdk21.tar.gz
      - name: Download OpenJDK 21 aarch64 JRE
        run: |
          set -e

          RELEASE_URL=$(curl -sSf \
            "https://api.adoptium.net/v3/assets/latest/21/jdk?architecture=aarch64&image_type=jre&os=linux&vendor=eclipse" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for entry in data:
              pkg = entry.get('binary', {}).get('package', {})
              link = pkg.get('link', '')
              if link.endswith('.tar.gz'):
                  print(link)
                  break
          ")

          if [ -z "$RELEASE_URL" ]; then
            echo "ERROR: Could not resolve JRE download URL from Adoptium API"
            exit 1
          fi

          echo "Downloading: $RELEASE_URL"
          curl -sSfL "$RELEASE_URL" -o /tmp/jre-aarch64.tar.gz

          SIZE=$(stat -c%s /tmp/jre-aarch64.tar.gz)
          echo "Downloaded ${SIZE} bytes"
          if [ "$SIZE" -lt 10000000 ]; then
            echo "ERROR: Tarball too small — download likely failed"
            exit 1
          fi

          mkdir -p app/src/main/assets/jre
          cp /tmp/jre-aarch64.tar.gz app/src/main/assets/jre/aarch64-jdk21.tar.gz
          echo "JRE asset ready ($(du -h app/src/main/assets/jre/aarch64-jdk21.tar.gz | cut -f1))"

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      # ── Collect output ───────────────────────────────────────────────────────
      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk \
             artifacts/PocketCraft-debug-${{ github.run_number }}.apk
          echo "APK_NAME=PocketCraft-debug-${{ github.run_number }}.apk" >> $GITHUB_ENV

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PocketCraft-debug-${{ github.run_number }}
          path: artifacts/PocketCraft-debug-${{ github.run_number }}.apk
          retention-days: 30

      # ── Summary ──────────────────────────────────────────────────────────────
      - name: Build summary
        run: |
          APK_SIZE=$(du -h artifacts/${{ env.APK_NAME }} | cut -f1)
          echo "## ✅ Build #${{ github.run_number }} successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**APK:** \`${{ env.APK_NAME }}\` — ${APK_SIZE}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download from the **Artifacts** section of this run." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### How to install" >> $GITHUB_STEP_SUMMARY
          echo "1. Download the APK from Artifacts above" >> $GITHUB_STEP_SUMMARY
          echo "2. On your Android device: Settings → Security → Install unknown apps" >> $GITHUB_STEP_SUMMARY
          echo "3. Transfer and tap the APK to install" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### What's inside" >> $GITHUB_STEP_SUMMARY
          echo "OpenJDK 21 (aarch64) is bundled — Minecraft servers will start on arm64 Android devices (API 26+)." >> $GITHUB_STEP_SUMMARY
