name: Build Debug APK

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ──────────────────────────────────────────────────────────────────
      # gradle/actions/setup-gradle downloads and installs the Gradle
      # distribution specified in gradle-wrapper.properties automatically,
      # bootstrapping the wrapper JAR if it isn't committed.
      # ──────────────────────────────────────────────────────────────────
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ──────────────────────────────────────────────────────────────────
      # Bundle the aarch64 OpenJDK 21 raw asset before building.
      # Azul Zulu headless JRE — no GUI libs, perfect for running server
      # jars.  Update this URL when a newer JDK release is available.
      # ──────────────────────────────────────────────────────────────────
      - name: Download aarch64 JDK 21 asset
        run: |
          mkdir -p app/src/main/assets/jre
          # Try Adoptium (Eclipse Temurin) API first — always returns the current LTS release.
          JRE_URL=$(curl -fsSL \
            "https://api.adoptium.net/v3/assets/latest/21/jre?architecture=aarch64&image_type=jre&jvm_impl=hotspot&os=linux&vendor=eclipse" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['binary']['package']['link'])" 2>/dev/null || true)
          # Fallback: pinned Azul Zulu 21 URL
          if [ -z "$JRE_URL" ]; then
            JRE_URL="https://cdn.azul.com/zulu/bin/zulu21.42.19-ca-jre21.0.7-linux_aarch64.tar.gz"
          fi
          echo "Downloading JRE from: $JRE_URL"
          curl -L --retry 3 -o app/src/main/assets/jre/aarch64-jdk21.tar.gz "$JRE_URL"
          echo "JRE asset: $(du -sh app/src/main/assets/jre/aarch64-jdk21.tar.gz | cut -f1)"

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PocketCraft-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload build reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports-${{ github.run_number }}
          path: |
            app/build/reports/
            app/build/outputs/logs/
          retention-days: 7
